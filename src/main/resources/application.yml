app:
  incoming-dir: ${APP_INCOMING_DIR:/data/incoming}
  processed-dir: ${APP_PROCESSED_DIR:/data/processed}
  error-dir: ${APP_ERROR_DIR:/data/error}
  poll-interval-seconds: ${APP_POLL_INTERVAL_SECONDS:10}
  template-dir: ${APP_TEMPLATE_DIR:classpath:/templates}
  template-main: ${APP_TEMPLATE_MAIN:analytic.jrxml}
  image-dir: ${APP_IMAGE_DIR:classpath:/images}
  font-dir: ${APP_FONT_DIR:classpath:/fonts}
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://minio:9000}}
  region: ${MINIO_REGION:us-east-1}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:lab-results}
